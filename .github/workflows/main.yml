name: ci-pipeline
on:
  - push

env:
  DOCKERHUB_USERNAME: dhruv3020
  DOCKER_IMAGE: action
  
jobs:
  CI_Integration:
    runs-on: ubuntu-latest
    steps:

      - name: Git checkout stage
        uses: actions/checkout@v4

      - name: Setting up java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: listing the JAVA home
        run: echo $JAVA_HOME

      - name: running the build
        run: mvn clean package
      
      - name: uploading the artifact
        uses: actions/upload-artifact@v7
        with:
          name: userservice
          path: target/userservice-0.0.1-SNAPSHOT.jar

      # https://github.com/marketplace/actions/dependency-check

      - name: running the OWASP dependency check
        uses: dependency-check/Dependency-Check_Action@main
        env: 
          JAVA_HOME: /opt/jdk
        with:
          project: 'userservice'
          path: '.'
          format: 'HTML'
          out: 'reports'
  
      - name: uploading the artifact
        uses: actions/upload-artifact@v7
        with:
           name: Depcheck report
           path: ${{github.workspace}}/reports

      - name: building the image
        run: |
          docker build -t $DOCKERHUB_USERNAME/$DOCKER_IMAGE:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '$DOCKERHUB_USERNAME/$DOCKER_IMAGE:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      - name: login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: publishing the image to dockerhub
        run: | 
          docker push $DOCKERHUB_USERNAME/$DOCKER_IMAGE:${{ github.sha }}